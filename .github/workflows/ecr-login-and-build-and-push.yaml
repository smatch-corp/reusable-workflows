name: AWS ECR 로그인 및 도커 이미지 빌드 및 푸시

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      ecr-repository:
        description: 빌드 후 이미지를 푸시 할 ECR 레지스트리 이름
        required: true
        type: string
      dockerfile:
        description: Dockerfile 경로
        required: false
        type: string
        default: Dockerfile
      build-context:
        description: Docker 빌드 컨텍스트 경로
        required: false
        type: string
        default: .
      docker-build-args:
        description: 이미지 빌드 시 --build-args 로 전달할 인자
        required: false
        type: string
      image-tag:
        description: 이미지 푸시할 때 사용할 이미지 태그
        required: true
        type: string
      alias-tag:
        description: 이미지 푸시할 때 보조로 사용할 이미지 태그
        required: false
        type: string
      timeout-minutes:
        description: 작업의 타임아웃 시간 (분)
        required: false
        type: number
        default: 30

    secrets:
      AWS_ACCESS_KEY_ID:
        description: "AWS 액세스 키 ID"
        required: true
      AWS_SECRET_ACCESS_KEY:
        description: "AWS 시크릿 액세스 키"
        required: true

jobs:
  build-and-push:
    strategy:
      matrix:
        timeout-minutes:
          - ${{ inputs.timeout-minutes }}
    timeout-minutes: ${{ matrix.timeout-minutes }}

    if: "${{ !(endsWith(github.ref, '/main') && startsWith(github.event.head_commit.message, 'chore: release v')) }}"

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v4

      - run: |
          ecr_registry_and_repository=${{ steps.ecr.outputs.registry }}/${{ inputs.ecr-repository }}

          if [ -z "${{ inputs.alias-tag }}" ]
          then
            echo "DOCKER_TAGS=$ecr_registry_and_repository:${{ inputs.image-tag }}" >> $GITHUB_ENV
          else
            echo "DOCKER_TAGS=$ecr_registry_and_repository:${{ inputs.image-tag }},$ecr_registry_and_repository:${{ inputs.alias-tag }}" >> $GITHUB_ENV
          fi

          # Dockerfile과 build-context 기본값 설정
          DOCKERFILE="${{ inputs.dockerfile }}"
          BUILD_CONTEXT="${{ inputs.build-context }}"
          
          if [ -z "$DOCKERFILE" ]; then
            DOCKERFILE="Dockerfile"
          fi
          
          if [ -z "$BUILD_CONTEXT" ]; then
            BUILD_CONTEXT="."
          fi
          
          echo "DOCKERFILE=$DOCKERFILE" >> $GITHUB_ENV
          echo "BUILD_CONTEXT=$BUILD_CONTEXT" >> $GITHUB_ENV

      - uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ env.DOCKER_TAGS }}
          file: ${{ env.DOCKERFILE }}
          context: ${{ env.BUILD_CONTEXT }}
          build-args: ${{ inputs.docker-build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - if: github.event_name == 'pull_request'
        uses: peter-evans/find-comment@v4
        id: comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: 도커 이미지가 빌드되었습니다.

      - if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            도커 이미지가 빌드되었습니다. (`${{ env.DOCKER_TAGS }}`)
          edit-mode: replace

      - if: github.event_name == 'pull_request'
        run: gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-label preview
        env:
          GH_TOKEN: ${{ github.token }}
